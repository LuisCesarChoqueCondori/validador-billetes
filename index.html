<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Billetes Bolivia</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="app-container">
        <h2>Escáner de Seguridad - Serie B</h2>
        
        <div class="camera-section">
            <video id="video" autoplay playsinline></video>
            <div id="scanner-overlay">
                <div class="guide-box"></div>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div id="info-panel">
            <p id="status-ocr">Iniciando sistema...</p>
            <div class="data-display">
                <span id="display-monto">Corte: --</span> | 
                <span id="display-serie">Serie: --</span>
            </div>
        </div>

        <div id="resultado" class="resultado-box"></div>
        
        <button id="btn-start" onclick="iniciarSistema()">📸 INICIAR ESCÁNER</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
